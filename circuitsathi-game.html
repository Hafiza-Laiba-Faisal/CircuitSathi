<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CircuitSathi — Traveler's Quest</title>
<meta name="description" content="CircuitSathi: An educational circuit quest game where Traveler explores circuits and learns electronics.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e17; color: #e2e8f0; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
  #game-canvas { width: 100vw; height: 100vh; display: block; image-rendering: pixelated; }
  #hud { position: fixed; top: 0; left: 0; right: 0; padding: 10px 18px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, rgba(10,14,23,0.95) 0%, rgba(10,14,23,0) 100%); z-index: 10; pointer-events: none; }
  #hud * { pointer-events: auto; }
  .hud-title { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #22cc66; letter-spacing: 3px; text-shadow: 0 0 12px #22cc6644; }
  .hud-xp { font-family: 'Press Start 2P', monospace; font-size: 9px; color: #ffd700; background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); padding: 5px 12px; border-radius: 6px; }
  #chat-log { position: fixed; bottom: 12px; left: 12px; max-width: 420px; max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; z-index: 10; scrollbar-width: none; }
  #chat-log::-webkit-scrollbar { display: none; }
  .chat-entry { padding: 6px 12px; border-radius: 4px; font-size: 10px; line-height: 1.5; white-space: pre-wrap; letter-spacing: 0.03em; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); animation: chatFadeIn 0.3s ease; }
  .chat-story { background: rgba(15,23,42,0.85); border-left: 3px solid #ffd700; color: #e2e8f0; }
  .chat-system { background: rgba(30,58,95,0.75); border-left: 3px solid #3b82f6; color: #93c5fd; }
  .chat-fault { background: rgba(127,29,29,0.75); border-left: 3px solid #ef4444; color: #fca5a5; }
  #controls { position: fixed; bottom: 12px; right: 12px; display: flex; gap: 8px; z-index: 10; }
  #controls button { font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 8px 14px; background: rgba(15,23,42,0.85); border: 1px solid #475569; border-radius: 6px; color: #94a3b8; cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; }
  #controls button:hover { color: #ffd700; border-color: #ffd700; box-shadow: 0 0 8px rgba(255,215,0,0.2); }
  #component-info { position: fixed; top: 50px; right: 12px; max-width: 240px; z-index: 10; }
  .info-card { background: rgba(15,23,42,0.92); border: 1px solid #22cc6644; border-radius: 8px; padding: 10px 14px; margin-bottom: 6px; font-size: 9px; color: #94a3b8; line-height: 1.5; }
  .info-card .label { color: #22cc66; font-weight: bold; font-size: 10px; margin-bottom: 4px; }
  @keyframes chatFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>

<div id="hud">
  <span class="hud-title">⚡ CIRCUITSATHI</span>
  <span class="hud-xp" id="xp-display">0 XP</span>
</div>

<div id="chat-log"></div>

<div id="controls">
  <button onclick="skipStory()">▶▶ SKIP</button>
  <button onclick="resetCircuit()">↺ RESET</button>
</div>

<div id="component-info" id="info-panel"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// CircuitSathi — Standalone Game (No dependencies, pure Canvas2D)
// ═══════════════════════════════════════════════════════════════════════════════

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const chatLog = document.getElementById('chat-log');
const infoPanel = document.getElementById('component-info');

// ── World constants ──────────────────────────────────────────────────────────
const WORLD_W = 1600, WORLD_H = 900;
const PX = 4; // pixel art scale
let camX = 0, camY = 0;
let elapsed = 0, xp = 0;

// ── Resize ───────────────────────────────────────────────────────────────────
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── Seeded RNG ───────────────────────────────────────────────────────────────
function seededRng(seed) {
  let s = seed;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

// ── Circuit definition (editable!) ───────────────────────────────────────────
const circuit = [
  { id: 'bat1', type: 'battery',   label: 'B1', value: 9,   x: 200,  y: 350 },
  { id: 'r1',   type: 'resistor',  label: 'R1', value: 220, x: 500,  y: 180 },
  { id: 'led1', type: 'led',       label: 'L1', value: 0,   x: 900,  y: 180 },
  { id: 'r2',   type: 'resistor',  label: 'R2', value: 470, x: 1200, y: 350 },
  { id: 'cap1', type: 'capacitor', label: 'C1', value: 100, x: 900,  y: 600 },
  { id: 'gnd',  type: 'ground',    label: 'GND', value: 0,  x: 200,  y: 600 },
];

// Physics
const vBat = circuit.find(c => c.type === 'battery')?.value ?? 9;
const rTotal = circuit.filter(c => c.type === 'resistor').reduce((s, c) => s + c.value, 0) || 1;
const current = vBat / rTotal;
const powered = true;

// Hero path (follows circuit loop)
const heroPath = [];
for (const comp of circuit) heroPath.push({ x: comp.x, y: comp.y, id: comp.id });
heroPath.push({ x: circuit[0].x, y: circuit[0].y, id: null }); // close loop

let heroIdx = 0, heroProgress = 0, heroFrame = 0, heroFacing = 1;
let heroPauseMs = 2000, heroSpeed = 120;
let skipRequested = false;
let visitedSet = new Set();
let currentStoryComp = null;

// ── PCB Background (cached to offscreen canvas) ─────────────────────────────
const bgCanvas = document.createElement('canvas');
bgCanvas.width = WORLD_W; bgCanvas.height = WORLD_H;
const bgCtx = bgCanvas.getContext('2d');

function drawPCBBackground() {
  const g = bgCtx;
  // Base green PCB
  g.fillStyle = '#0a3a1a';
  g.fillRect(0, 0, WORLD_W, WORLD_H);

  // Tile variation
  const TILE = 32;
  for (let tx = 0; tx < WORLD_W / TILE; tx++) {
    for (let ty = 0; ty < WORLD_H / TILE; ty++) {
      const h = (tx * 1619 + ty * 2971) % 17;
      if (h < 3) { g.fillStyle = '#0c4420'; g.fillRect(tx * TILE, ty * TILE, TILE, TILE); }
      else if (h < 5) { g.fillStyle = '#082e14'; g.fillRect(tx * TILE, ty * TILE, TILE, TILE); }
    }
  }

  // Grid lines
  g.strokeStyle = 'rgba(34,204,102,0.06)';
  g.lineWidth = 1;
  for (let gx = 0; gx < WORLD_W; gx += 64) { g.beginPath(); g.moveTo(gx, 0); g.lineTo(gx, WORLD_H); g.stroke(); }
  for (let gy = 0; gy < WORLD_H; gy += 64) { g.beginPath(); g.moveTo(0, gy); g.lineTo(WORLD_W, gy); g.stroke(); }

  // PCB traces
  const rng = seededRng(42);
  for (let i = 0; i < 60; i++) {
    const x = rng() * WORLD_W, y = rng() * WORLD_H;
    const horiz = rng() > 0.5, len = 40 + rng() * 140;
    g.fillStyle = 'rgba(51,170,85,0.25)';
    if (horiz) g.fillRect(x, y, len, 3);
    else g.fillRect(x, y, 3, len);
  }

  // Via holes
  for (let i = 0; i < 70; i++) {
    const x = rng() * WORLD_W, y = rng() * WORLD_H, r = 3 + rng() * 6;
    g.beginPath(); g.arc(x, y, r, 0, Math.PI * 2);
    g.fillStyle = 'rgba(24,104,48,0.5)'; g.fill();
    g.beginPath(); g.arc(x, y, r * 0.4, 0, Math.PI * 2);
    g.fillStyle = 'rgba(10,42,16,0.8)'; g.fill();
  }

  // SMD pads
  for (let i = 0; i < 40; i++) {
    const x = rng() * WORLD_W, y = rng() * WORLD_H;
    g.fillStyle = 'rgba(68,187,102,0.3)';
    g.fillRect(x, y, 8, 4);
  }
}
drawPCBBackground();

// ── Draw path (copper trace between components) ──────────────────────────────
function drawCircuitPath() {
  ctx.lineWidth = 20;
  ctx.strokeStyle = 'rgba(26,107,58,0.6)';
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  for (let i = 0; i < heroPath.length; i++) {
    const p = heroPath[i];
    if (i === 0) ctx.moveTo(p.x - camX, p.y - camY);
    else ctx.lineTo(p.x - camX, p.y - camY);
  }
  ctx.stroke();

  // Dashed electron flow overlay
  ctx.setLineDash([8, 12]);
  ctx.lineDashOffset = -(elapsed * 0.06);
  ctx.lineWidth = 2;
  ctx.strokeStyle = powered ? 'rgba(255,215,0,0.5)' : 'rgba(100,100,100,0.2)';
  ctx.beginPath();
  for (let i = 0; i < heroPath.length; i++) {
    const p = heroPath[i];
    if (i === 0) ctx.moveTo(p.x - camX, p.y - camY);
    else ctx.lineTo(p.x - camX, p.y - camY);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

// ── Schematic symbols ────────────────────────────────────────────────────────
const COMP_COLORS = {
  battery: { stroke: '#ffd700', glow: '#ffaa00' },
  resistor: { stroke: '#cc8844', glow: '#8b5a30' },
  led: { stroke: '#ff6600', glow: '#ffcc44' },
  capacitor: { stroke: '#4488cc', glow: '#4040cc' },
  ground: { stroke: '#aa55ff', glow: '#6b21a8' },
};

function drawComponent(comp) {
  const x = comp.x - camX, y = comp.y - camY;
  const col = COMP_COLORS[comp.type] || { stroke: '#888', glow: '#555' };
  const sc = powered ? col.glow : col.stroke;
  const isActive = currentStoryComp === comp.id;

  // Glow
  if (powered) {
    ctx.beginPath(); ctx.arc(x, y, 50, 0, Math.PI * 2);
    ctx.fillStyle = col.glow + '15'; ctx.fill();
  }
  if (isActive) {
    ctx.beginPath(); ctx.arc(x, y, 55, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]); ctx.lineDashOffset = -(elapsed * 0.05);
    ctx.stroke(); ctx.setLineDash([]);
  }

  ctx.strokeStyle = sc; ctx.lineWidth = 3; ctx.fillStyle = sc;

  switch (comp.type) {
    case 'battery':
      ctx.beginPath(); ctx.moveTo(x - 40, y); ctx.lineTo(x - 14, y); ctx.stroke();
      ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(x - 14, y - 22); ctx.lineTo(x - 14, y + 22); ctx.stroke();
      ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x - 4, y - 12); ctx.lineTo(x - 4, y + 12); ctx.stroke();
      ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(x + 6, y - 22); ctx.lineTo(x + 6, y + 22); ctx.stroke();
      ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x + 16, y - 12); ctx.lineTo(x + 16, y + 12); ctx.stroke();
      ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x + 16, y); ctx.lineTo(x + 40, y); ctx.stroke();
      ctx.font = '12px monospace'; ctx.fillText('+', x - 18, y - 28); ctx.fillText('−', x + 12, y - 28);
      break;
    case 'resistor':
      ctx.beginPath(); ctx.moveTo(x - 40, y); ctx.lineTo(x - 22, y); ctx.stroke();
      ctx.strokeRect(x - 22, y - 12, 44, 24);
      if (powered) { ctx.fillStyle = col.glow + '18'; ctx.fillRect(x - 22, y - 12, 44, 24); }
      ctx.strokeStyle = sc; ctx.beginPath(); ctx.moveTo(x + 22, y); ctx.lineTo(x + 40, y); ctx.stroke();
      break;
    case 'led':
      ctx.beginPath(); ctx.moveTo(x - 40, y); ctx.lineTo(x - 16, y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x - 16, y - 16); ctx.lineTo(x - 16, y + 16); ctx.lineTo(x + 10, y); ctx.closePath();
      ctx.fillStyle = powered ? 'rgba(255,136,0,0.5)' : 'rgba(50,50,50,0.3)'; ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + 10, y - 16); ctx.lineTo(x + 10, y + 16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + 10, y); ctx.lineTo(x + 40, y); ctx.stroke();
      if (powered) {
        ctx.strokeStyle = '#ffdd00'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x + 14, y - 18); ctx.lineTo(x + 22, y - 26); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + 20, y - 12); ctx.lineTo(x + 28, y - 20); ctx.stroke();
      }
      break;
    case 'capacitor':
      ctx.beginPath(); ctx.moveTo(x - 40, y); ctx.lineTo(x - 6, y); ctx.stroke();
      ctx.lineWidth = 5;
      ctx.beginPath(); ctx.moveTo(x - 6, y - 22); ctx.lineTo(x - 6, y + 22); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + 6, y - 22); ctx.lineTo(x + 6, y + 22); ctx.stroke();
      ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x + 6, y); ctx.lineTo(x + 40, y); ctx.stroke();
      break;
    case 'ground':
      ctx.beginPath(); ctx.moveTo(x, y - 30); ctx.lineTo(x, y - 6); ctx.stroke();
      ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(x - 24, y - 6); ctx.lineTo(x + 24, y - 6); ctx.stroke();
      ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x - 16, y + 4); ctx.lineTo(x + 16, y + 4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x - 8, y + 14); ctx.lineTo(x + 8, y + 14); ctx.stroke();
      break;
  }

  // Label
  ctx.fillStyle = '#bbbbbb'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
  ctx.fillText(comp.label, x, y + 42);
  // Value
  if (comp.value > 0) {
    const unit = comp.type === 'battery' ? 'V' : comp.type === 'resistor' ? 'Ω' : comp.type === 'capacitor' ? 'µF' : '';
    ctx.fillStyle = powered ? col.glow : '#888';
    ctx.font = 'bold 10px monospace';
    ctx.fillText(`${comp.value}${unit}`, x, y + 54);
  }
  ctx.textAlign = 'left';
}

// ── Pixel-art Traveler ───────────────────────────────────────────────────────
function drawHero(x, y, frame, facing) {
  const sx = x - camX, sy = y - camY;
  const P = PX;
  const px = (dx, dy, color) => {
    ctx.fillStyle = color;
    ctx.fillRect(sx + dx * P * facing, sy + dy * P, P, P);
  };

  // Hair (blue spikes)
  [-2,-1,0,1,2].forEach(dx => px(dx, -8*P/P - 32, '#3388ff'));
  px(-1, -36, '#3388ff'); px(1, -36, '#3388ff'); px(0, -40, '#3388ff');

  // Head (gold skin)
  [-1,0,1].forEach(dx => px(dx, -28, '#ffd700'));
  [-2,-1,0,1,2].forEach(dx => px(dx, -24, '#ffd700'));
  [-2,-1,0,1,2].forEach(dx => px(dx, -20, '#ffd700'));
  // Eyes
  px(-1, -20, '#111'); px(1, -20, '#111');

  // Torso (blue jacket)
  [-2,-1,0,1,2].forEach(dx => { px(dx, -16, '#2266cc'); px(dx, -12, '#2266cc'); px(dx, -8, '#2266cc'); });
  // Lightning bolt on chest
  px(0, -16, '#ffee00'); px(0, -12, '#ffee00');
  // Belt
  [-2,-1,0,1,2].forEach(dx => px(dx, -4, '#cc8833'));

  // Arms (swap with frame)
  if (frame === 0) {
    px(-3, -16, '#ffcc88'); px(-3, -12, '#ffcc88');
    px(3, -12, '#ffcc88'); px(3, -8, '#ffcc88');
  } else {
    px(-3, -12, '#ffcc88'); px(-3, -8, '#ffcc88');
    px(3, -16, '#ffcc88'); px(3, -12, '#ffcc88');
  }

  // Legs (alternate with frame)
  if (frame === 0) {
    px(-1, 0, '#334466'); px(-1, 4, '#334466'); px(-1, 8, '#334466');
    px(1, 0, '#334466'); px(1, 4, '#334466');
    px(-1, 12, '#885522'); px(1, 8, '#885522');
  } else {
    px(-1, 0, '#334466'); px(-1, 4, '#334466');
    px(1, 0, '#334466'); px(1, 4, '#334466'); px(1, 8, '#334466');
    px(-1, 8, '#885522'); px(1, 12, '#885522');
  }
}

// ── Particles (electron flow along path) ─────────────────────────────────────
const particles = [];
for (let i = 0; i < 18; i++) particles.push({ t: Math.random(), speed: 0.0004 + Math.random() * 0.0006 });

function drawParticles() {
  if (!powered) return;
  const pathLen = heroPath.length - 1;
  for (const p of particles) {
    p.t = (p.t + p.speed * 1.5) % 1;
    const segT = p.t * pathLen;
    const segIdx = Math.min(pathLen - 1, Math.floor(segT));
    const frac = segT - segIdx;
    const a = heroPath[segIdx], b = heroPath[Math.min(heroPath.length - 1, segIdx + 1)];
    const px = a.x + (b.x - a.x) * frac - camX;
    const py = a.y + (b.y - a.y) * frac - camY;
    ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,215,0,0.8)'; ctx.fill();
  }
}

// ── Physics stories ──────────────────────────────────────────────────────────
function getStory(comp) {
  const vDrop = comp.type === 'resistor' ? (vBat * comp.value / rTotal).toFixed(2) : null;
  switch (comp.type) {
    case 'battery':
      return `⚡ POWER SOURCE — ${comp.label}\nVoltage: ε = ${comp.value}V (EMF)\nPushes electrons like water pressure.\nI = V/R = ${vBat}V / ${rTotal}Ω = ${(current*1000).toFixed(1)}mA`;
    case 'resistor':
      return `🔥 RESISTOR — ${comp.label} (${comp.value}Ω)\nV = I × R (Ohm's Law)\nV_drop = ${vDrop}V\nConverts electrical energy → heat.`;
    case 'led':
      return `💡 LED — ${comp.label} GLOWING!\nForward voltage V_f ≈ 2.0–3.5V\nCurrent → photon emission\nE = h × f = hc/λ`;
    case 'capacitor':
      return `🔋 CAPACITOR — ${comp.label} (${comp.value}µF)\nStores charge: Q = C × V\nEnergy: E = ½CV²\nI = C × dV/dt`;
    case 'ground':
      return `⏚ GROUND — ${comp.label}\nReference: V = 0V\nKirchhoff: ΣI_in = ΣI_out\nAll current returns here.`;
    default: return `📍 ${comp.label}`;
  }
}

// ── Chat system ──────────────────────────────────────────────────────────────
function addChat(text, type = 'story') {
  const div = document.createElement('div');
  div.className = `chat-entry chat-${type}`;
  div.textContent = text;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
  // Fade old entries
  while (chatLog.children.length > 12) chatLog.removeChild(chatLog.firstChild);
}

// ── Speech bubble ────────────────────────────────────────────────────────────
function drawSpeechBubble(text, hx, hy) {
  if (!text) return;
  const sx = hx - camX, sy = hy - camY - 60;
  const lines = text.split('\n');
  const lineH = 13, padX = 10, padY = 8;
  const maxW = Math.max(...lines.map(l => ctx.measureText(l).width)) + padX * 2;
  const bh = lines.length * lineH + padY * 2;
  const bx = sx - maxW / 2, by = sy - bh - 12;

  // Bubble
  ctx.fillStyle = 'rgba(15,23,42,0.92)';
  ctx.strokeStyle = '#475569';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(bx, by, maxW, bh, 6);
  ctx.fill(); ctx.stroke();

  // Tail
  ctx.fillStyle = 'rgba(15,23,42,0.92)';
  ctx.beginPath();
  ctx.moveTo(sx - 6, by + bh); ctx.lineTo(sx + 6, by + bh); ctx.lineTo(sx, by + bh + 10);
  ctx.fill();

  // Text
  ctx.fillStyle = '#e2e8f0'; ctx.font = '9px "Courier New", monospace';
  lines.forEach((line, i) => ctx.fillText(line, bx + padX, by + padY + 9 + i * lineH));
}

// ── Info cards ────────────────────────────────────────────────────────────────
function updateInfoPanel() {
  infoPanel.innerHTML = '';
  const comp = circuit.find(c => c.id === currentStoryComp);
  if (!comp) return;
  const card = document.createElement('div');
  card.className = 'info-card';
  card.innerHTML = `<div class="label">${comp.type.toUpperCase()} — ${comp.label}</div>${getStory(comp).replace(/\n/g, '<br>')}`;
  infoPanel.appendChild(card);
}

// ── Hero movement ────────────────────────────────────────────────────────────
function updateHero(dt) {
  if (skipRequested && heroPauseMs > 0) {
    heroPauseMs = 0; currentStoryComp = null; skipRequested = false; return;
  }
  skipRequested = false;

  if (heroPauseMs > 0) { heroPauseMs -= dt; if (heroPauseMs <= 0) currentStoryComp = null; return; }

  const pathLen = heroPath.length - 1;
  const segIdx = heroIdx % pathLen;
  const a = heroPath[segIdx], b = heroPath[(segIdx + 1) % heroPath.length];
  const dist = Math.hypot(b.x - a.x, b.y - a.y);
  if (dist < 1) { heroIdx = (heroIdx + 1) % pathLen; heroProgress = 0; return; }

  const step = (heroSpeed * dt) / 1000 / dist;
  heroProgress += step;

  // Walk frame
  heroFrame = Math.floor(elapsed / 200) % 2;

  if (heroProgress >= 1) {
    heroProgress = 0;
    heroIdx = (heroIdx + 1) % pathLen;
    const nextPt = heroPath[heroIdx];

    if (nextPt.id && !visitedSet.has(nextPt.id)) {
      const comp = circuit.find(c => c.id === nextPt.id);
      if (comp) {
        visitedSet.add(comp.id);
        currentStoryComp = comp.id;
        heroPauseMs = 3500;
        addChat(getStory(comp), comp.fault ? 'fault' : 'story');
        updateInfoPanel();
        xp += 25;
        document.getElementById('xp-display').textContent = `${xp} XP`;
      }
    }
    return;
  }

  const dx = b.x - a.x;
  if (Math.abs(dx) > 1) heroFacing = dx > 0 ? 1 : -1;
}

// ── Skip / Reset ─────────────────────────────────────────────────────────────
function skipStory() { skipRequested = true; }
function resetCircuit() {
  heroIdx = 0; heroProgress = 0; heroPauseMs = 1500;
  visitedSet = new Set(); currentStoryComp = null; xp = 0;
  document.getElementById('xp-display').textContent = '0 XP';
  chatLog.innerHTML = '';
  addChat('⚡ I AM TRAVELER!\nAn electron explorer who\ntravels through circuits.\nI power up cities, light LEDs,\nand spin motors!', 'story');
  addChat('🗺️ Circuit complete! TRAVELER begins the journey!', 'system');
}

// ── Main game loop ───────────────────────────────────────────────────────────
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = lastTime ? timestamp - lastTime : 16;
  lastTime = timestamp;
  elapsed += dt;

  updateHero(dt);

  // Camera follows hero
  const pathLen = heroPath.length - 1;
  const segIdx = heroIdx % pathLen;
  const a = heroPath[segIdx], b = heroPath[(segIdx + 1) % heroPath.length];
  const hx = a.x + (b.x - a.x) * heroProgress;
  const hy = a.y + (b.y - a.y) * heroProgress;
  const targetCamX = hx - canvas.width / 2;
  const targetCamY = hy - canvas.height / 2;
  camX += (targetCamX - camX) * 0.08;
  camY += (targetCamY - camY) * 0.08;

  // Clear
  ctx.fillStyle = '#0a0e17';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.drawImage(bgCanvas, -camX, -camY);

  // Circuit path
  drawCircuitPath();

  // Particles
  drawParticles();

  // Components
  for (const comp of circuit) drawComponent(comp);

  // Hero
  drawHero(hx, hy, heroFrame, heroFacing);

  // Speech bubble
  if (currentStoryComp) {
    const comp = circuit.find(c => c.id === currentStoryComp);
    if (comp) {
      const shortStory = getStory(comp).split('\n').slice(0, 3).join('\n');
      drawSpeechBubble(shortStory, hx, hy);
    }
  } else if (!powered) {
    drawSpeechBubble('⚡ TRAVELER\nAwaiting a\ncomplete circuit!', hx, hy);
  }

  // Day/night tint
  const t = (elapsed % 60000) / 60000;
  let alpha = 0;
  if (t < 0.25) alpha = 0.07 * (1 - t / 0.25);
  else if (t > 0.75) alpha = 0.12 + ((t - 0.75) / 0.25) * 0.1;
  if (alpha > 0.001) {
    ctx.fillStyle = `rgba(0,0,40,${alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  requestAnimationFrame(gameLoop);
}

// ── Init ─────────────────────────────────────────────────────────────────────
addChat('⚡ I AM TRAVELER!\nAn electron explorer who\ntravels through circuits.\nI power up cities, light LEDs,\nand spin motors!', 'story');
addChat('🗺️ Circuit complete! TRAVELER begins the journey!', 'system');
addChat(`📊 V=${vBat}V  R=${rTotal}Ω  I=${(current*1000).toFixed(1)}mA`, 'system');

requestAnimationFrame(gameLoop);
</script>
